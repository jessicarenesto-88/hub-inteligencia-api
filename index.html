<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico Inteligente</title>

<style>

body{
font-family:Arial;
padding:40px;
background:#fff;
}

.container{
max-width:700px;
margin:auto;
}

input{
width:100%;
padding:16px;
border:1px solid #ccc;
border-radius:12px;
margin-bottom:16px;
font-size:18px;
box-sizing:border-box;
}

button{
background:#000;
color:#fff;
border:none;
padding:14px 24px;
border-radius:12px;
font-size:18px;
cursor:pointer;
margin-bottom:20px;
}

#resposta{
background:#f5f5f5;
padding:24px;
border-radius:16px;
line-height:1.7;
min-height:120px;
}

</style>

</head>

<body>

<div class="container">

<h1>Diagnóstico Inteligente Residencial</h1>

<input
id="pergunta"
placeholder="Descreva um problema da sua casa"
/>

<button onclick="perguntar()">
Perguntar
</button>

<div id="resposta">
A resposta aparecerá aqui.
</div>

</div>

<script>

async function perguntar(){

const pergunta =
document.getElementById("pergunta").value;

document.getElementById("resposta")
.innerHTML = "Pensando...";

try{

const response = await fetch(
"/api/chat",
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:pergunta
})

}
);

const data = await response.json();

document.getElementById("resposta")
.innerHTML =
data.choices?.[0]?.message?.content
|| data.error
|| data.erro
|| JSON.stringify(data);

}catch(e){

document.getElementById("resposta")
.innerHTML =
"Erro: " + e.message;

}

}

</script>

</body>
</html>
